<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Tabseet Flex</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem("palette"));
          var vars = stored && stored.vars;
          if (!vars) return;
          var root = document.documentElement.style;
          for (var key in vars) root.setProperty("--color-" + key, vars[key]);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-white text-gray-900 dark:bg-base-950 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
