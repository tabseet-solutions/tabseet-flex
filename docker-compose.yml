name: tabseet-flex

services:
  tabseet-flex:
    build: .
    container_name: tabseet-flex
    ports:
      - "127.0.0.1:4400:4400"
    volumes:
      # Media drive mounts are dynamic - see mounts.txt. start.sh parses it
      # and layers the resulting volumes overlay on top of this file (piped
      # in via stdin); this file only has the static stuff.
      #
      # Persisted app data: library roots, watch progress, thumbnail/sprite cache.
      - ./data:/app/data
      - ./cache:/app/cache
    restart: "no"
    # Manual start/stop only (./start.sh / ./stop.sh) - the container never
    # comes back on its own, not even after a crash or a Colima VM restart.
    # Hard cap so a burst of ffmpeg thumbnail/sprite/flip jobs gets killed
    # instead of starving the whole VM. The VM itself is already capped at
    # 4GB by colima (see start.sh), so the host was never at risk, but this
    # keeps a single runaway container from taking down everything else
    # sharing that VM.
    mem_limit: 2g
    memswap_limit: 2g
